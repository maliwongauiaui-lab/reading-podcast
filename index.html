.score-g{background:#d3f9d8;color:#2b7d3b;border-radius:8px;padding:2px 6px;font-weight:600;font-size:0.75rem}
.score-y{background:#fff3bf;color:#7d6000;border-radius:8px;padding:2px 6px;font-weight:600;font-size:0.75rem}
.score-r{background:#ffe0e0;color:#c00;border-radius:8px;padding:2px 6px;font-weight:600;font-size:0.75rem}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;z-index:100}

.timer{font-size:1.4rem;font-weight:600;color:#ff4444;text-align:center;height:2rem;display:flex;align-items:center;justify-content:center}
.attempts{display:flex;flex-direction:column;gap:7px;margin-bottom:0.75rem;min-height:30px}

.attempt-num{font-size:0.72rem;color:#999;min-width:48px}
.play-btn{width:30px;height:30px;border-radius:50%;background:#ff6b9d;border:none;cursor:pointer;color:white;font-size:0.65rem;flex-shrink:0}

.record-btn{width:100%;padding:0.85rem;border-radius:14px;border:none;font-family:'Kanit',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:12px;font-size:0.85rem;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}

// ===== STATE =====
var currentUser = null;
var currentRole = 'student';
var myRecs = {};
var allRecs = [];
var currentStory = null;
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;
var timerInt = null;
var secs = 0;
var currentFilter = 'all';
var currentAudio = null;

// ===== LOGIN =====
function setRole(r) {
  currentRole = r;
  document.getElementById('tab-student').classList.toggle('active', r === 'student');
  document.getElementById('tab-teacher').classList.toggle('active', r === 'teacher');
  document.getElementById('teacher-pass-wrap').style.display = r === 'teacher' ? 'block' : 'none';
  document.getElementById('login-btn').className = 'btn-login' + (r === 'teacher' ? ' btn-teacher' : '');
}

function doLogin() {
  var name = document.getElementById('name-input').value.trim();
  if (!name) { showToast('กรุณาพิมพ์ชื่อก่อนนะ'); return; }
  if (currentRole === 'teacher') {
    var pass = document.getElementById('teacher-pass').value;
    if (pass !== TEACHER_PASSWORD) { showToast('รหัสครูไม่ถูกต้อง'); return; }
  }
  currentUser = name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-pill').textContent = (currentRole === 'teacher' ? '👩‍🏫 ' : '👤 ') + name;
  if (currentRole === 'teacher') {
    document.getElementById('student-view').style.display = 'none';
    document.getElementById('teacher-view').style.display = 'block';
    loadAllRecs();
  } else {
    loadMyRecs();
  }
}

function logout() {
  currentUser = null; myRecs = {}; allRecs = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('name-input').value = '';
  document.getElementById('teacher-pass').value = '';
  document.getElementById('student-view').style.display = 'block';
  document.getElementById('teacher-view').style.display = 'none';
  setRole('student');
}

// ===== SUPABASE =====
function loadMyRecs() {
  sb.from('recordings').select('*').eq('student_name', currentUser)
    .then(function(res) {
      myRecs = {};
      if (res.data) {
        res.data.forEach(function(r) {
          if (!myRecs[r.story_id]) myRecs[r.story_id] = [];
          myRecs[r.story_id].push(r);
        });
      }
      renderGrid();
      renderStats();
    });
}

function loadAllRecs() {
  sb.from('recordings').select('*').order('created_at', {ascending: false})
    .then(function(res) {
      allRecs = res.data || [];
      renderTeacher();
    });
}

function saveRec(storyId, blob, dur) {
  document.getElementById('loading').style.display = 'flex';
  var fname = 'rec_' + storyId + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + '.webm';
  sb.storage.from('audio-files').upload(fname, blob, {contentType: 'audio/webm'})
    .then(function(upRes) {
      if (upRes.error) {
        document.getElementById('loading').style.display = 'none';
        showToast('อัปโหลดไฟล์ไม่ได้: ' + upRes.error.message);
        return;
      }
      var urlRes = sb.storage.from('audio-files').getPublicUrl(fname);
      var audioUrl = urlRes.data.publicUrl;
      return sb.from('recordings').insert({
        student_name: currentUser,
        story_id: storyId,
        audio_url: audioUrl,
        duration: dur
      }).select().single();
    })
    .then(function(dbRes) {
      document.getElementById('loading').style.display = 'none';
      if (!dbRes) return;
      if (dbRes.error) {
        showToast('บันทึกข้อมูลไม่ได้: ' + dbRes.error.message);
        return;
      }
      if (!myRecs[storyId]) myRecs[storyId] = [];
      myRecs[storyId].push(dbRes.data);
      showToast('บันทึกเสียงสำเร็จ! 🎉');
      renderAttempts();
      renderGrid();
      renderStats();
    })
    .catch(function(e) {
      document.getElementById('loading').style.display = 'none';
      showToast('เกิดข้อผิดพลาด: ' + e.message);
    });
}

function deleteRec(recId, storyId) {
  sb.from('recordings').delete().eq('id', recId).then(function() {
    myRecs[storyId] = myRecs[storyId].filter(function(r) { return r.id !== recId; });
    if (!myRecs[storyId].length) delete myRecs[storyId];
    renderAttempts();
    renderGrid();
    renderStats();
  });
}

// ===== RENDER =====
function renderStats() {
  var done = Object.keys(myRecs).length;
  var total = Object.values(myRecs).reduce(function(a,b) { return a + b.length; }, 0);
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent = Math.round(done/15*100) + '%';
  document.getElementById('p-fill').style.width = (done/15*100) + '%';
  document.getElementById('p-text').textContent = done + ' / 15 บท';
}

function doFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  renderGrid();
}

function renderGrid() {
  var g = document.getElementById('story-grid');
  var filtered = stories.filter(function(s) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'done') return !!myRecs[s.id];
    return String(s.level) === currentFilter;
  });
  g.innerHTML = filtered.map(function(s) {
    var recs = myRecs[s.id] || [];
    var done = recs.length > 0;
    return '<div class="card ' + (done ? 'done' : '') + '" onclick="openStory(' + s.id + ')">' +
      (done ? '<div class="card-badge">' + recs.length + ' ครั้ง</div>' : '') +
      '<span class="card-emoji">' + s.emoji + '</span>' +
      '<div class="card-title">' + s.title + '</div>' +
      '<span class="level-badge l' + s.level + '">ระดับ ' + s.level + '</span>' +
      '</div>';
  }).join('');
}

function renderTeacher() {
  var names = [];
  allRecs.forEach(function(r) {
    if (names.indexOf(r.student_name) === -1) names.push(r.student_name);
  });
  names.sort();
  var nums = stories.map(function(_,i) { return '<th>' + (i+1) + '</th>'; }).join('');
  document.getElementById('t-head').innerHTML = '<th>ชื่อ</th>' + nums + '<th>รวม</th>';
  document.getElementById('t-body').innerHTML = names.map(function(n) {
    var cells = stories.map(function(s) {
      var count = allRecs.filter(function(r) { return r.student_name === n && r.story_id === s.id; }).length;
      if (!count) return '<td style="color:#ddd">—</td>';
      if (count >= 3) return '<td>✅</td>';
      return '<td style="color:#ff8c42;font-weight:600">' + count + 'x</td>';
    }).join('');
    var total = stories.filter(function(s) {
      return allRecs.some(function(r) { return r.student_name === n && r.story_id === s.id; });
    }).length;
    var sc = total >= 12 ? 'score-g' : total >= 7 ? 'score-y' : 'score-r';
    return '<tr><td style="text-align:left;padding-left:8px;font-weight:500;white-space:nowrap">' + n + '</td>' + cells + '<td><span class="' + sc + '">' + total + '/15</span></td></tr>';
  }).join('') || '<tr><td colspan="17" style="padding:1rem;color:#bbb;text-align:center">ยังไม่มีข้อมูล</td></tr>';
}

// ===== MODAL =====
function openStory(id) {
  currentStory = null;
  for (var i = 0; i < stories.length; i++) {
    if (stories[i].id === id) { currentStory = stories[i]; break; }
  }
  if (!currentStory) return;
  document.getElementById('m-emoji').textContent = currentStory.emoji;
  document.getElementById('m-title').textContent = currentStory.title;
  var lc = ['','l1','l2','l3','l4'];
  var ll = ['','⭐ ระดับ 1','⭐⭐ ระดับ 2','⭐⭐⭐ ระดับ 3','⭐⭐⭐⭐ ระดับ 4'];
  document.getElementById('m-level').innerHTML = '<span class="level-badge ' + lc[currentStory.level] + '">' + ll[currentStory.level] + '</span>';
  document.getElementById('m-story').innerHTML = currentStory.text.split('\n').map(function(l) { return '<p>' + l + '</p>'; }).join('');
  renderAttempts();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderAttempts() {
  if (!currentStory) return;
  var recs = myRecs[currentStory.id] || [];
  var list = document.getElementById('attempts');
  if (!recs.length) {
    list.innerHTML = '<div class="no-rec">ยังไม่มีการบันทึกเสียง</div>';
  } else {
    list.innerHTML = recs.map(function(r, i) {
      var bars = '';
      for (var j = 0; j < 18; j++) {
        bars += '<div class="wbar" style="height:' + (4 + Math.abs(Math.sin(j*0.8+i)*8) + Math.random()*6) + 'px"></div>';
      }
      var d = new Date(r.created_at);
      var date = d.getDate() + '/' + (d.getMonth()+1);
      return '<div class="attempt-row">' +
        '<span class="attempt-num">ครั้งที่ ' + (i+1) + '</span>' +
        '<button class="play-btn" onclick="playAudio(\'' + r.audio_url + '\')">▶</button>' +
        '<div class="waveform">' + bars + '</div>' +
        '<span class="attempt-date">' + date + '</span>' +
        '<button class="del-btn" onclick="deleteRec(\'' + r.id + '\',' + currentStory.id + ')">✕</button>' +
        '</div>';
    }).join('');
  }
  document.getElementById('done-badge').style.display = recs.length ? 'flex' : 'none';
}

function closeModal() {
  if (isRecording) stopRec();
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentStory = null;
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function playAudio(url) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.play().catch(function() { showToast('ไม่สามารถเล่นเสียงได้'); });
}

// ===== RECORDING =====
function toggleRec() {
  if (isRecording) { stopRec(); } else { startRec(); }
}

function startRec() {
  navigator.mediaDevices.getUserMedia({audio: true})
    .then(function(stream) {
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
      mediaRecorder.onstop = function() {
        var blob = new Blob(audioChunks, {type: 'audio/webm'});
        stream.getTracks().forEach(function(t) { t.stop(); });
        saveRec(currentStory.id, blob, secs);
      };
      mediaRecorder.start();
      isRecording = true;
      secs = 0;
      timerInt = setInterval(function() {
        secs++;
        var m = String(Math.floor(secs/60)).padStart(2,'0');
        var s = String(secs%60).padStart(2,'0');
        document.getElementById('timer').textContent = m + ':' + s;
      }, 1000);
      document.getElementById('rec-btn').className = 'record-btn recording';
      document.getElementById('rec-icon').textContent = '⏹';
      document.getElementById('rec-text').textContent = 'หยุดบันทึก';
    })
    .catch(function() { showToast('กรุณาอนุญาตการใช้งานไมโครโฟน'); });
}

function stopRec() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    clearInterval(timerInt);
    isRecording = false;
    document.getElementById('timer').textContent = '';
    document.getElementById('rec-btn').className = 'record-btn idle';
    document.getElementById('rec-icon').textContent = '🎙️';
    document.getElementById('rec-text').textContent = 'บันทึกอีกครั้ง';
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
</script>
